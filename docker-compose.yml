services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: "5000"
      MONGODB_URI: "mongodb://mongo:27017/ctf_platform_premium"
      JWT_SECRET: "change-me-in-production"
      JWT_EXPIRES_IN: "7d"
      CORS_ORIGIN: "http://localhost:3000,http://127.0.0.1:3000,http://192.168.1.100:3000"
      FRONTEND_URL: "http://192.168.1.100:3000"

      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: "landry.manampisoa@gmail.com"
      SMTP_PASS: "esosdjrwhaihbgcp"
      SMTP_FROM: "CyberCTF <landry.manampisoa@gmail.com>"

      AUTO_RECALC_SCORES_ON_BOOT: "true"
      ADMIN_USERNAME: "admin"
      ADMIN_EMAIL: "admin@ctf.com"
      ADMIN_PASSWORD: "admin123"
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: "http://192.168.1.100:5000"
    ports:
      - "3000:3000"

volumes:
  mongo_data:
    name: ${MONGO_VOLUME_NAME:-cyberctf_mongo_data}
